<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>DCTI | Portal de Ciencia y Tecnología</title>
    <!-- Hoja de estilos unificada del Portal DCTI -->
    <link rel="stylesheet" href="Assets/css/portal.css?v=1">
    <!-- CSS Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="auth-view-root" class="hidden"></div>
    <div id="admin-root" class="hidden"></div>

    <div id="public-portal">
        <header>
            <div class="header">
                <picture>
                    <source srcset="Assets/images/img01.png">
                    <img src="Assets/images/img1.png" alt="logotipo" class="img">
                </picture>
            </div>
            <nav>
                <ul id="nav-menu">
                    <li><a href="#" data-target="view-inicio" class="nav-link public-nav-active">Inicio</a></li>
                    <li><a href="#" data-target="view-dcti" class="nav-link">DCTI</a></li>
                    <li><a href="#" data-target="view-ejes" class="nav-link">Ejes de gestion</a></li>
                    <li><a href="#" data-target="view-proyectos" class="nav-link">Proyectos</a></li>
                    <li><a href="#" data-target="view-noticias" class="nav-link">Noticias</a></li>
                    <li><a href="#" data-target="view-cursos" class="nav-link">Cursos</a></li>
                    <li><a href="#" data-target="view-contactos" class="nav-link">Contactos</a></li>
                    <li id="public-auth-menu" style="margin-left: auto;">
                        <!-- Se llena dinámicamente con JS (User Pill o enlace "Ingresar") -->
                    </li>
                </ul>
            </nav>
        </header>

        <main id="public-main-content">
            <!-- Las vistas se cargarán dinámicamente aquí -->
            <div id="public-view-root"></div>
        </main>


        <footer>
            <div class="img">
                <picture>
                    <source srcset="Assets/images/img02.png">
                    <img src="Assets/images/img2.png" width="150" height="150" alt="imagotipo">
                </picture>
            </div>
            <div class="footer">
                <p>Dirección de Ciencia, Tecnología e Innovación. Gobierno del Estado Monagas. Comprometidos con el
                    desarrollo científico y tecnológico de nuestra patria.</p>
                <a href="#"
                    onclick="event.preventDefault(); if(typeof Router !== 'undefined') Router.navigateTo('login'); else if(typeof showLogin === 'function') showLogin();">
                    <img src="Assets/images/usuario.png" alt="iniciar sesion" class="inicio" width="40px">
                </a>
                <a href="#"><img src="Assets/images/insta.svg" alt="instagram" width="40px"></a>
                <a href="#"><img src="Assets/images/face.svg" alt="facebook" width="40px"></a>
                <a href="#"><img src="Assets/images/twitterx.png" alt="twitter" width="40px"></a>
            </div>
        </footer>
    </div>

    <!-- Core Dependencies -->
    <!-- Core Dependencies (External) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Dynamic Application Loader -->
    <script src="Presentacion/app-loader.js"></script>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
</body>

</html>
